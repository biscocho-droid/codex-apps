name: Update Portfolio Prices

on:
  workflow_dispatch:
  schedule:
    # 5:00 PM Central Daylight Time. GitHub cron is UTC and may run late.
    - cron: "0 22 * * 1-5"

permissions:
  contents: write

jobs:
  update-portfolio-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out automation
        uses: actions/checkout@v4
        with:
          ref: main
          path: source

      - name: Check out Pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update portfolio prices
        run: |
          python3 source/scripts/update_portfolio_prices.py \
            --output pages/portfolio-command-center/data/portfolio-prices.json

      - name: Commit updated price feed
        working-directory: pages
        run: |
          if git diff --quiet -- portfolio-command-center/data/portfolio-prices.json; then
            echo "No portfolio price changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portfolio-command-center/data/portfolio-prices.json
          git commit -m "Update portfolio prices"
          git push origin gh-pages
