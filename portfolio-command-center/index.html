<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Portfolio Command Center</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #050607;
      color: #f4f6f8;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
    }

    main {
      width: min(520px, calc(100% - 2rem));
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      background: #101216;
    }

    p {
      color: #9aa4af;
      line-height: 1.5;
    }

    a {
      color: #72dc8f;
    }
  </style>
</head>
<body>
  <main>
    <h1>Opening Portfolio Command Center</h1>
    <p>Refreshing the local app cache and opening the current version.</p>
    <p><a href="../portfolio-command-center-live/">Open Portfolio Command Center</a></p>
  </main>

  <script>
    async function clearPortfolioCache() {
      if ("serviceWorker" in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map((registration) => registration.unregister()));
      }

      if ("caches" in window) {
        const keys = await caches.keys();
        await Promise.all(keys
          .filter((key) => key.includes("portfolio-command-center"))
          .map((key) => caches.delete(key)));
      }
    }

    clearPortfolioCache()
      .catch(() => {})
      .finally(() => {
        window.location.replace("../portfolio-command-center-live/?from=original");
      });
  </script>
</body>
</html>
